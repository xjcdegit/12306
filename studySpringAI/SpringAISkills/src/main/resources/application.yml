server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: spring-ai-skills
  
  ai:
    dashscope:
      api-key: ${API-KEY}
      chat:
        options:
          model: qwen-plus
    
    mcp:
      client:
        enabled: true
        type: SYNC
        toolcallback:
          enabled: true
        sse:
          connections:
            learning-mcp:
              url: http://localhost:8000/sse

spring-ai-skills:
  demo:
    enabled: true
  
  mcp:
    server:
      enabled: false
      host: localhost
      port: 9000

logging:
  level:
    root: INFO
    com.springai.skills: DEBUG
    org.springframework.ai: DEBUG
    io.modelcontextprotocol: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
