<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI RAG API 测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .status-bar {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        .status-item {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
        }
        .status-item.active {
            background: rgba(76, 175, 80, 0.3);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-header h3 {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
        }
        .method {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .method.get { background: #e3f2fd; color: #1976d2; }
        .method.post { background: #e8f5e9; color: #388e3c; }
        .method.delete { background: #ffebee; color: #d32f2f; }
        .card-body {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 16px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            max-height: 300px;
            overflow: auto;
        }
        .result.success {
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
        }
        .result.error {
            background: #ffebee;
            border: 1px solid #ffcdd2;
        }
        .result pre {
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .tools-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .tool-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
        }
        .tool-item .name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
            word-break: break-all;
        }
        .tool-item .desc {
            color: #666;
            line-height: 1.4;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Spring AI RAG API 测试面板</h1>
            <p>测试所有 API 端点，查看实时响应结果</p>
            <div class="status-bar">
                <div class="status-item" id="serverStatus">服务状态: 检测中...</div>
                <div class="status-item" id="mcpStatus">MCP: 检测中...</div>
                <div class="status-item" id="toolCount">工具数: -</div>
            </div>
        </header>

        <div class="grid">
            <!-- Skill 匹配 -->
            <div class="card">
                <div class="card-header">
                    <span class="method get">GET</span>
                    <h3>Skill 匹配</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>消息内容</label>
                        <input type="text" id="skillMatchMsg" value="我想去天津旅游" placeholder="输入消息内容">
                    </div>
                    <button class="btn btn-primary" onclick="testSkillMatch()">测试匹配</button>
                    <div class="result" id="skillMatchResult" style="display:none;"></div>
                </div>
            </div>

            <!-- 聊天测试 -->
            <div class="card">
                <div class="card-header">
                    <span class="method get">GET</span>
                    <h3>智能聊天</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>会话ID</label>
                        <input type="text" id="chatConvId" value="test-001" placeholder="会话ID">
                    </div>
                    <div class="form-group">
                        <label>用户ID</label>
                        <input type="text" id="chatUserId" value="user-001" placeholder="用户ID">
                    </div>
                    <div class="form-group">
                        <label>消息</label>
                        <textarea id="chatMsg" placeholder="输入消息...">查询北京市海淀区中关村的坐标</textarea>
                    </div>
                    <button class="btn btn-primary" onclick="testChat()">发送消息</button>
                    <div class="result" id="chatResult" style="display:none;"></div>
                </div>
            </div>

            <!-- MCP 工具列表 -->
            <div class="card">
                <div class="card-header">
                    <span class="method get">GET</span>
                    <h3>MCP 工具列表</h3>
                </div>
                <div class="card-body">
                    <button class="btn btn-primary" onclick="testMcpTools()">获取工具列表</button>
                    <div class="result" id="mcpToolsResult" style="display:none;"></div>
                </div>
            </div>

            <!-- MCP 状态 -->
            <div class="card">
                <div class="card-header">
                    <span class="method get">GET</span>
                    <h3>MCP 状态</h3>
                </div>
                <div class="card-body">
                    <button class="btn btn-primary" onclick="testMcpStatus()">获取状态</button>
                    <div class="result" id="mcpStatusResult" style="display:none;"></div>
                </div>
            </div>

            <!-- 记忆统计 -->
            <div class="card">
                <div class="card-header">
                    <span class="method get">GET</span>
                    <h3>记忆统计</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>会话ID</label>
                        <input type="text" id="statsConvId" value="test-001" placeholder="会话ID">
                    </div>
                    <div class="form-group">
                        <label>用户ID</label>
                        <input type="text" id="statsUserId" value="user-001" placeholder="用户ID">
                    </div>
                    <button class="btn btn-primary" onclick="testStats()">获取统计</button>
                    <div class="result" id="statsResult" style="display:none;"></div>
                </div>
            </div>

            <!-- 最近对话 -->
            <div class="card">
                <div class="card-header">
                    <span class="method get">GET</span>
                    <h3>最近对话</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>会话ID</label>
                        <input type="text" id="recentConvId" value="test-001" placeholder="会话ID">
                    </div>
                    <div class="form-group">
                        <label>数量</label>
                        <input type="number" id="recentCount" value="10" min="1" max="100">
                    </div>
                    <button class="btn btn-primary" onclick="testRecent()">获取对话</button>
                    <div class="result" id="recentResult" style="display:none;"></div>
                </div>
            </div>

            <!-- 完整对话历史 -->
            <div class="card">
                <div class="card-header">
                    <span class="method get">GET</span>
                    <h3>完整对话历史</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>会话ID</label>
                        <input type="text" id="completeConvId" value="test-001" placeholder="会话ID">
                    </div>
                    <button class="btn btn-primary" onclick="testComplete()">获取历史</button>
                    <div class="result" id="completeResult" style="display:none;"></div>
                </div>
            </div>

            <!-- 用户历史 -->
            <div class="card">
                <div class="card-header">
                    <span class="method get">GET</span>
                    <h3>用户历史</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>用户ID</label>
                        <input type="text" id="userHistoryId" value="user-001" placeholder="用户ID">
                    </div>
                    <div class="form-group">
                        <label>限制</label>
                        <input type="number" id="userHistoryLimit" value="100" min="1" max="1000">
                    </div>
                    <button class="btn btn-primary" onclick="testUserHistory()">获取历史</button>
                    <div class="result" id="userHistoryResult" style="display:none;"></div>
                </div>
            </div>

            <!-- 删除会话 -->
            <div class="card">
                <div class="card-header">
                    <span class="method delete">DELETE</span>
                    <h3>删除会话</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>会话ID</label>
                        <input type="text" id="deleteConvId" value="test-001" placeholder="会话ID">
                    </div>
                    <button class="btn btn-primary" onclick="testDelete()" style="background: linear-gradient(135deg, #e53935 0%, #d32f2f 100%);">删除会话</button>
                    <div class="result" id="deleteResult" style="display:none;"></div>
                </div>
            </div>

            <!-- MCP 聊天 -->
            <div class="card">
                <div class="card-header">
                    <span class="method get">GET</span>
                    <h3>MCP 聊天</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>提示词</label>
                        <textarea id="mcpChatPrompt" placeholder="输入提示词...">帮我查询北京今天的天气</textarea>
                    </div>
                    <button class="btn btn-primary" onclick="testMcpChat()">发送</button>
                    <div class="result" id="mcpChatResult" style="display:none;"></div>
                </div>
            </div>

            <!-- 简单聊天 -->
            <div class="card">
                <div class="card-header">
                    <span class="method get">GET</span>
                    <h3>简单聊天 (无Skill路由)</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>会话ID</label>
                        <input type="text" id="simpleConvId" value="test-002" placeholder="会话ID">
                    </div>
                    <div class="form-group">
                        <label>用户ID</label>
                        <input type="text" id="simpleUserId" value="user-001" placeholder="用户ID">
                    </div>
                    <div class="form-group">
                        <label>消息</label>
                        <textarea id="simpleMsg" placeholder="输入消息...">你好</textarea>
                    </div>
                    <button class="btn btn-primary" onclick="testSimpleChat()">发送</button>
                    <div class="result" id="simpleChatResult" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8081';

        async function fetchApi(url, resultId) {
            const resultEl = document.getElementById(resultId);
            resultEl.style.display = 'block';
            resultEl.className = 'result';
            resultEl.innerHTML = '<span class="loading"></span>请求中...';

            try {
                const response = await fetch(url);
                const data = await response.json();
                resultEl.className = 'result success';
                resultEl.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                return data;
            } catch (error) {
                resultEl.className = 'result error';
                resultEl.innerHTML = '<pre>错误: ' + error.message + '</pre>';
                return null;
            }
        }

        function testSkillMatch() {
            const msg = encodeURIComponent(document.getElementById('skillMatchMsg').value);
            fetchApi(`${BASE_URL}/memory/skill-match?message=${msg}`, 'skillMatchResult');
        }

        function testChat() {
            const convId = encodeURIComponent(document.getElementById('chatConvId').value);
            const userId = encodeURIComponent(document.getElementById('chatUserId').value);
            const msg = encodeURIComponent(document.getElementById('chatMsg').value);
            fetchApi(`${BASE_URL}/memory/chat?conversationId=${convId}&userId=${userId}&message=${msg}`, 'chatResult');
        }

        function testMcpTools() {
            fetchApi(`${BASE_URL}/api/mcp/tools`, 'mcpToolsResult');
        }

        function testMcpStatus() {
            fetchApi(`${BASE_URL}/api/mcp/status`, 'mcpStatusResult');
        }

        function testStats() {
            const convId = encodeURIComponent(document.getElementById('statsConvId').value);
            const userId = encodeURIComponent(document.getElementById('statsUserId').value);
            fetchApi(`${BASE_URL}/memory/stats?conversationId=${convId}&userId=${userId}`, 'statsResult');
        }

        function testRecent() {
            const convId = encodeURIComponent(document.getElementById('recentConvId').value);
            const count = document.getElementById('recentCount').value;
            fetchApi(`${BASE_URL}/memory/recent?conversationId=${convId}&lastN=${count}`, 'recentResult');
        }

        function testComplete() {
            const convId = encodeURIComponent(document.getElementById('completeConvId').value);
            fetchApi(`${BASE_URL}/memory/complete?conversationId=${convId}`, 'completeResult');
        }

        function testUserHistory() {
            const userId = encodeURIComponent(document.getElementById('userHistoryId').value);
            const limit = document.getElementById('userHistoryLimit').value;
            fetchApi(`${BASE_URL}/memory/user-history?userId=${userId}&limit=${limit}`, 'userHistoryResult');
        }

        async function testDelete() {
            const convId = encodeURIComponent(document.getElementById('deleteConvId').value);
            const resultEl = document.getElementById('deleteResult');
            resultEl.style.display = 'block';
            resultEl.className = 'result';
            resultEl.innerHTML = '<span class="loading"></span>请求中...';

            try {
                const response = await fetch(`${BASE_URL}/memory/conversation/${convId}`, { method: 'DELETE' });
                const data = await response.json();
                resultEl.className = 'result success';
                resultEl.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                resultEl.className = 'result error';
                resultEl.innerHTML = '<pre>错误: ' + error.message + '</pre>';
            }
        }

        function testMcpChat() {
            const prompt = encodeURIComponent(document.getElementById('mcpChatPrompt').value);
            fetchApi(`${BASE_URL}/api/mcp/chat?prompt=${prompt}`, 'mcpChatResult');
        }

        function testSimpleChat() {
            const convId = encodeURIComponent(document.getElementById('simpleConvId').value);
            const userId = encodeURIComponent(document.getElementById('simpleUserId').value);
            const msg = encodeURIComponent(document.getElementById('simpleMsg').value);
            fetchApi(`${BASE_URL}/memory/chat-simple?conversationId=${convId}&userId=${userId}&message=${msg}`, 'simpleChatResult');
        }

        // 初始化检查服务状态
        async function checkStatus() {
            const statusEl = document.getElementById('serverStatus');
            const mcpEl = document.getElementById('mcpStatus');
            const toolEl = document.getElementById('toolCount');

            try {
                const response = await fetch(`${BASE_URL}/api/mcp/status`);
                if (response.ok) {
                    const data = await response.json();
                    statusEl.textContent = '服务状态: 运行中';
                    statusEl.classList.add('active');
                    mcpEl.textContent = 'MCP: ' + (data.mcpEnabled ? '已启用' : '未启用');
                    if (data.mcpEnabled) mcpEl.classList.add('active');
                    toolEl.textContent = '工具数: ' + data.toolCount;
                } else {
                    statusEl.textContent = '服务状态: 异常';
                }
            } catch (error) {
                statusEl.textContent = '服务状态: 无法连接';
                mcpEl.textContent = 'MCP: -';
                toolEl.textContent = '工具数: -';
            }
        }

        // 页面加载后检查状态
        checkStatus();
    </script>
</body>
</html>
