server:
  port: 8081
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: spring-ai-rag
  
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  
  datasource:
    url: jdbc:mysql://localhost:3306/spring_ai_rag?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  ai:
    dashscope:
      api-key: ${API-KEY}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3
    
    mcp:
      client:
        enabled: true
        type: SYNC
        toolcallback:
          enabled: true
        stdio:
          servers-configuration: classpath:/mcp-servers-config.json

spring-ai-rag:
  vector-store:
    type: simple
    persist-path: ./data/vector-store.json
  
  document:
    chunk-size: 500
    chunk-overlap: 50

memory:
  compression:
    enabled: true
    token-threshold: 8000
    keep-recent: 10

logging:
  level:
    root: INFO
    com.springai.rag: INFO
    org.springframework.ai: INFO
    io.modelcontextprotocol: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
